<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJS Electric | Promote Employees</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:rgb(130,130,130);
color:#2600ff;
}

/* NAV */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgb(37,37,37);
border-bottom:3px solid white;
}

nav ul{
list-style:none;
display:flex;
gap:25px;
}

nav a{
text-decoration:none;
color:white;
font-weight:bold;
}

nav a:hover{
color:#32CD32;
}

.logo{
height:100px;
}

/* PAGE */

.container{
max-width:1000px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.user{
background:#f5f5f5;
padding:15px;
border-radius:8px;
margin-bottom:10px;
}

button{
padding:8px 12px;
margin-top:10px;
background:#32CD32;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#28a428;
}

</style>

</head>

<body>

<script>

let role = localStorage.getItem("role");

if(role !== "admin"){
alert("Admins only");
window.location.href="dashboard.html";
}

</script>

<!-- NAV -->

<nav>

<img src="ajselectric2.jpg" class="logo">

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="request.html">Request Service</a></li>
<li><a href="dashboard.html">Dashboard</a></li>
</ul>

</nav>

<div class="container">

<div class="card">

<h2>Promote Employees</h2>

<div id="promoteList"></div>

</div>

</div>

<script>

function loadUsers(){

let users = JSON.parse(localStorage.getItem("users")) || [];

let list = document.getElementById("promoteList");

list.innerHTML="";

users.forEach((u,i)=>{

let div=document.createElement("div");

div.className="user";

div.innerHTML=`

<strong>${u.username}</strong><br>
Current Role: ${u.role}<br>

<button onclick="promote(${i})">Promote</button>

`;

list.appendChild(div);

});

}

function promote(i){

let users = JSON.parse(localStorage.getItem("users")) || [];

if(users[i].role==="member"){
users[i].role="employee";
}

else if(users[i].role==="employee"){
users[i].role="admin";
}

localStorage.setItem("users",JSON.stringify(users));

loadUsers();

}

loadUsers();

</script>

</body>
</html>
